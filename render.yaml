databases:
  - name: market-event-impact-db
    plan: free
    databaseName: market_event_impact
    user: market_event_impact

services:
  - type: web
    name: market-event-impact-web
    plan: free
    runtime: node
    buildCommand: npm ci --include=dev && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-event-impact-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # Render's free tier does not support background workers — this requires a paid plan.
  # On the free tier, omit this service and instead hit POST /api/cron/run on a schedule
  # (e.g. via Render Cron Jobs or an external scheduler such as cron-job.org).
  - type: worker
    name: market-event-impact-cron
    plan: starter
    runtime: node
    buildCommand: npm ci --include=dev
    startCommand: npm run cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-event-impact-db
          property: connectionString
      - key: CRON_SCHEDULE
        value: "*/15 * * * *"
      - key: NODE_ENV
        value: production
